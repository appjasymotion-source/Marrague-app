<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marragué Niassa v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #e5b94c; --gold-dark: #b8933a; --dark: #0a0a0a; --glass: rgba(255,255,255,0.12); --admin-red: #ff4757; --whatsapp: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: var(--dark); color: white; overflow-x: hidden; }
        
        .main-bg { position: fixed; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1445116572660-236099ec97a0?q=80&w=2071&auto=format&fit=crop'); background-size: cover; background-position: center; z-index: -1; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; padding: 20px; z-index: 10; overflow-y: auto; }
        .active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; margin-bottom: 20px; }
        
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 12px; color: white; margin-bottom: 10px; outline: none; }
        
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 13px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-wa { background: var(--whatsapp); color: white; margin-top: 8px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-item { background: var(--glass); padding: 20px 10px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .menu-item i { font-size: 28px; color: var(--gold); margin-bottom: 8px; display: block; }
        
        .result-card { background: white; color: #222; border-radius: 18px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; }
        
        .loader { width: 40px; height: 40px; border: 4px solid rgba(229,185,76,0.2); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div id="splash" class="screen active" style="justify-content:center; align-items:center;">
        <div style="text-align: center;">
            <h1 style="font-size: 40px; color: var(--gold); font-weight: 800;">MARRAGUÉ</h1>
            <p style="letter-spacing: 4px; font-size: 10px; opacity: 0.8;">NIASSA EXPLORER</p>
            <div class="loader"></div>
        </div>
    </div>

    <div id="login" class="screen" style="justify-content:center;">
        <div class="glass-card">
            <h2 style="color: var(--gold); margin-bottom: 15px;">Acesso</h2>
            <input type="email" id="emailField" placeholder="Email">
            <input type="password" id="passField" placeholder="Palavra-passe">
            <button class="btn-gold" onclick="autenticar()">Entrar</button>
        </div>
    </div>

    <div id="userDash" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="userName" style="color: var(--gold); font-size: 18px;">Olá, Explorador</h2>
            <button onclick="logout()" style="width:auto; padding:5px 12px; background:rgba(255,255,255,0.1); color:white; font-size:10px;">SAIR</button>
        </div>

        <div id="mainMenu" class="menu-grid">
            <div class="menu-item" onclick="abrirCategoria('Restaurante')"><i class="fas fa-utensils"></i>
