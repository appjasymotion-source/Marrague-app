<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marragué Niassa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #e5b94c; --dark: #0c0c0c; --glass: rgba(255,255,255,0.1); --admin-red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body, html { height: 100%; width: 100%; background: #000; color: white; overflow: hidden; }
        .main-bg { position: fixed; width: 100%; height: 100%; background: url('https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg') center/cover; z-index: -1; }
        .overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 0; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; padding: 20px; z-index: 10; overflow-y: auto; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 25px; width: 100%; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; color: white; margin-bottom: 12px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: #000; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .points-badge { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .menu-item { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .menu-item i { font-size: 24px; color: var(--gold); margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="overlay"></div>

    <div id="splash" class="screen active" style="justify-content:center; align-items:center;">
        <h1 style="font-size: 50px; color: var(--gold); font-weight: 900;">Marragué</h1>
        <div style="width: 40px; height: 40px; border: 4px solid var(--gold); border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="login" class="screen" style="justify-content:center; align-items:center;">
        <h2 style="margin-bottom: 20px; color: var(--gold);">Entrar</h2>
        <div class="glass-card" style="max-width: 350px;">
            <input type="email" id="userEmail" placeholder="Email">
            <input type="password" id="userPass" placeholder="Senha">
            <button class="btn-gold" onclick="entrar()">Aceder</button>
            <p style="margin-top: 15px; font-size: 13px; text-align:center;" onclick="alert('Funcionalidade de registo em breve!')">Criar nova conta</p>
        </div>
    </div>

    <div id="userDash" class="screen">
        <div class="header">
            <h3>Olá, <span id="clientName">Usuário</span></h3>
            <div class="points-badge"><i class="fas fa-star"></i> 120 pts</div>
        </div>
        <div class="glass-card">
            <input type="text" placeholder="🔍 Restaurantes, Hoteis...">
        </div>
        <div class="menu-grid">
            <div class="menu-item"><i class="fas fa-utensils"></i><p>Restaurantes</p></div>
            <div class="menu-item"><i class="fas fa-bed"></i><p>Hoteis</p></div>
            <div class="menu-item"><i class="fas fa-map-marker-alt"></i><p>Maps</p></div>
            <div class="menu-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i><p>Sair</p></div>
        </div>
    </div>

    <div id="adminDash" class="screen">
        <h3 style="color: var(--admin-red); margin-bottom:20px;"><i class="fas fa-user-shield"></i> PAINEL ADMIN</h3>
        <div class="menu-grid">
            <div class="menu-item" style="border-color: var(--admin-red);"><i class="fas fa-plus-circle"></i><p>Novo Menu</p></div>
            <div class="menu-item" style="border-color: var(--admin-red);"><i class="fas fa-users"></i><p>Usuários</p></div>
            <div class="menu-item" onclick="location.reload()"><i class="fas fa-power-off"></i><p>Sair</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        
        // As tuas chaves reais
        const firebaseConfig = {
          apiKey: "AIzaSyAZ_V-SfLdEXuPlU7W4uyWHvC_-Zm94jxU",
          authDomain: "marragueapp.firebaseapp.com",
          projectId: "marragueapp",
          storageBucket: "marragueapp.firebasestorage.app",
          messagingSenderId: "863284423517",
          appId: "1:863284423517:web:c8883f5b0875d7b4a7d6b4",
          measurementId: "G-TE2CP3SX66"
        };

        const app = initializeApp(firebaseConfig);
        console.log("Firebase conectado!");

        // Funções de navegação
        window.irPara = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.entrar = function() {
            const email = document.getElementById('userEmail').value;
            if (email === "admin@marrague.com") {
                irPara('adminDash');
            } else if (email.includes("@")) {
                document.getElementById('clientName').innerText = email.split('@')[0];
                irPara('userDash');
            } else {
                alert("Insira um email válido!");
            }
        }

        setTimeout(() => { irPara('login'); }, 3000);
    </script>
</body>
</html>
