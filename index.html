<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marragué Niassa v4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --gold: #e5b94c; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; }
        body { background: var(--dark); color: var(--white); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        
        /* Telas */
        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Componentes de Design */
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; position: sticky; top: 0; background: var(--dark); z-index: 10; }
        .logo { color: var(--gold); font-size: 28px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        
        .gold-btn { background: var(--gold); color: black; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin: 10px 0; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-field { background: var(--gray); border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; width: 100%; margin: 8px 0; box-sizing: border-box; font-size: 16px; }
        
        /* Cards de Listagem */
        .card { background: var(--gray); border-radius: 18px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .card-info { padding: 18px; }
        .card-title { color: var(--gold); font-size: 20px; margin: 0 0 8px 0; }
        .card-desc { color: #bbb; font-size: 14px; line-height: 1.4; margin-bottom: 15px; }
        
        .btn-flex { display: flex; gap: 12px; }
        .btn-call { background: var(--white); color: black; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; border: none; }
        .btn-wa { background: #25d366; color: white; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; border: none; }

        /* Loader */
        .loader { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login" class="screen active">
        <div style="text-align: center; margin-top: 50px;">
            <h1 class="logo">MARRAGUÉ</h1>
            <p style="color: #888;">Explore Cuamba e Niassa</p>
        </div>
        <div style="margin-top: 40px;">
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Palavra-passe">
            <button class="gold-btn" onclick="auth()">ENTRAR</button>
            <p style="text-align: center; font-size: 13px; color: #666; margin-top: 20px;">Novo por aqui? Criar Conta</p>
        </div>
    </div>

    <div id="menu" class="screen">
        <div class="header"><h2 class="logo" style="font-size: 20px;">EXPLORAR</h2></div>
        <button class="gold-btn" onclick="verCat('Restaurante')"><i class="fas fa-utensils"></i> RESTAURANTES</button>
        <button class="gold-btn" onclick="verCat('Hotel')"><i class="fas fa-bed"></i> HOTÉIS</button>
        <button class="gold-btn" onclick="verCat('Loja')"><i class="fas fa-shopping-cart"></i> LOJAS E SERVIÇOS</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">
        <button class="gold-btn" style="background: #333; color: white;" onclick="irPara('admin')"><i class="fas fa-user-shield"></i> MODO GESTOR</button>
    </div>

    <div id="lista" class="screen">
        <div class="header">
            <button onclick="irPara('menu')" style="position: absolute; left: 20px; background: none; border: none; color: var(--gold); font-size: 22px;"><i class="fas fa-arrow-left"></i></button>
            <span id="catTitulo" style="font-weight: bold; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;">Categoria</span>
        </div>
        <div id="container"></div>
    </div>

    <div id="admin" class="screen">
        <div class="header"><h2 style="color: #ff4444; margin:0;">PAINEL GESTOR</h2></div>
        <input type="text" id="adm-nome" class="input-field" placeholder="Nome do Local (Ex: Hotel Niassa)">
        <select id="adm-cat" class="input-field">
            <option value="Restaurante">Restaurante</option>
            <option value="Hotel">Hotel</option>
            <option value="Loja">Loja / Serviço</option>
        </select>
        <input type="tel" id="adm-tel" class="input-field" placeholder="Telefone (84/82/87...)">
        <input type="text" id="adm-foto" class="input-field" placeholder="Link da Foto (URL da imagem)">
        <textarea id="adm-desc" class="input-field" rows="3" placeholder="Descrição curta do que oferecem..."></textarea>
        <button id="btnSalvar" class="gold-btn" onclick="salvarNovo()">PUBLICAR NO APP</button>
        <button class="gold-btn" style="background: #333; color: white;" onclick="irPara('menu')">SAIR DO MODO GESTOR</button>
    </div>

    <script>
        // Configuração Oficial do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAZ_V-SfLdEXuPlU7W4uyWHvC_-Zm94jxU",
            authDomain: "marragueapp.firebaseapp.com",
            projectId: "marragueapp",
            storageBucket: "marragueapp.firebasestorage.app",
            messagingSenderId: "863284423517",
            appId: "1:863284423517:web:c8883f5b0875d7b4a7d6b4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Navegação entre telas
        function irPara(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // Lógica de Login simples
        function auth() {
            const email = document.getElementById('email').value.toLowerCase();
            if(email === "admin@marrague.com") {
                irPara('admin');
            } else {
                irPara('menu');
            }
        }

        // Salvar no Firebase
        async function salvarNovo() {
            const btn = document.getElementById('btnSalvar');
            const nome = document.getElementById('adm-nome').value;
            const tel = document.getElementById('adm-tel').value;

            if(!nome || !tel) return alert("Por favor, preencha Nome e Telefone!");

            btn.disabled = true;
            btn.innerText = "A PUBLICAR...";

            const novoLocal = {
                nome: nome,
                cat: document.getElementById('adm-cat').value,
                tel: tel,
                foto: document.getElementById('adm-foto').value || "https://via.placeholder.com/400x200?text=Marrague+Niassa",
                desc: document.getElementById('adm-desc').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("pontos").add(novoLocal);
                alert("Sucesso! Local publicado em Cuamba.");
                irPara('menu');
                // Limpar campos
                document.getElementById('adm-nome').value = "";
                document.getElementById('adm-tel').value = "";
                document.getElementById('adm-foto').value = "";
                document.getElementById('adm-desc').value = "";
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
            btn.disabled = false;
            btn.innerText = "PUBLICAR NO APP";
        }

        // Mostrar locais por categoria
        function verCat(categoria) {
            irPara('lista');
            document.getElementById('catTitulo').innerText = categoria;
            const container = document.getElementById('container');
            container.innerHTML = '<div class="loader"></div>';

            db.collection("pontos").where("cat", "==", categoria).orderBy("timestamp", "desc").onSnapshot(snap => {
                container.innerHTML = "";
                if(snap.empty) {
                    container.innerHTML = "<p style='text-align:center; color:#666; margin-top:50px;'>Nenhum local cadastrado nesta categoria.</p>";
                    return;
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <img src="${d.foto}" onerror="this.src='https://via.placeholder.com/400x200?text=Imagem+Indisponivel'">
                            <div class="card-info">
                                <h3 class="card-title">${d.nome}</h3>
                                <p class="card-desc">${d.desc || 'Sem descrição disponível.'}</p>
                                <div class="btn-flex">
                                    <button class="btn-call" onclick="window.location.href='tel:${d.tel}'"><i class="fas fa-phone"></i> LIGAR</button>
                                    <button class="btn-wa" onclick="window.location.href='https://wa.me/258${d.tel.replace(/\s/g,'')}'"><i class="fab fa-whatsapp"></i> WHATSAPP</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
